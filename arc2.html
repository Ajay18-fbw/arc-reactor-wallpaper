<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arc Reactor — Live Wallpaper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; }

  /* ── HUD WRAPPER ── */
  #hud {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }

  /* corner brackets */
  .cb { position: absolute; width: 22px; height: 22px; border-color: rgba(0,200,255,0.22); border-style: solid; }
  .cb-tl { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
  .cb-tr { top: 10px; right: 10px; border-width: 1px 1px 0 0; }
  .cb-bl { bottom: 10px; left: 10px; border-width: 0 0 1px 1px; }
  .cb-br { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

  /* small HUD text corners */
  .hud-corner {
    position: absolute;
    color: rgba(0, 210, 255, 0.32);
    font-size: 8px;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    line-height: 1.85;
  }
  .hud-tl { top: 20px; left: 26px; }
  .hud-tr { top: 20px; right: 26px; text-align: right; }
  .hud-bl { bottom: 20px; left: 26px; }

  /* ── CLOCK PANEL — top-right ── */
  #clock-panel {
    position: absolute;
    top: 14px;
    right: 22px;
    text-align: right;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0;
  }

  /* Day + Date row — sits ABOVE the big time */
  #clock-daydate {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.20em;
    color: rgba(0, 200, 255, 0.55);
    text-transform: uppercase;
    margin-bottom: 3px;
    /* subtle left-border accent */
    padding-right: 2px;
  }
  #clock-daydate .day-name {
    color: rgba(0, 230, 255, 0.80);
    font-weight: 700;
    margin-right: 6px;
  }

  /* Big digital time */
  #clock-time {
    font-family: 'Courier New', monospace;
    font-size: 52px;
    font-weight: 700;
    letter-spacing: 0.07em;
    color: rgba(0, 225, 255, 0.95);
    text-shadow:
      0 0 6px rgba(0,210,255,0.9),
      0 0 16px rgba(0,190,255,0.6),
      0 0 36px rgba(0,150,255,0.28),
      0 0 65px rgba(0,120,255,0.10);
    line-height: 1;
    margin-bottom: 3px;
  }
  /* seconds — smaller */
  #clock-time span.sec {
    font-size: 28px;
    opacity: 0.55;
    vertical-align: middle;
  }

  /* AM/PM */
  #clock-ampm {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: rgba(0, 200, 255, 0.42);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* Location */
  #clock-location {
    font-family: 'Courier New', monospace;
    font-size: 8.5px;
    letter-spacing: 0.14em;
    color: rgba(0, 175, 255, 0.30);
    text-transform: uppercase;
  }

  /* Thin vertical accent bar on the right edge of clock block */
  #clock-panel::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    right: -10px;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(0,200,255,0.35) 30%, rgba(0,200,255,0.35) 70%, transparent);
  }

  /* bottom status bar */
  #sbar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,200,255,0.45), transparent);
    z-index: 10; animation: sp 3.5s ease-in-out infinite;
  }
  @keyframes sp { 0%,100%{opacity:.25} 50%{opacity:.9} }

  /* blinking colons */
  @keyframes colonBlink { 0%,49%{opacity:1} 50%,100%{opacity:0.15} }
  .colon { animation: colonBlink 1s step-start infinite; }

  /* fade in from top-left */
  @keyframes panelFadeIn { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
  #clock-panel { animation: panelFadeIn 1.0s ease forwards; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- ── HUD ── -->
<div id="hud">
  <div class="cb cb-tl"></div><div class="cb cb-tr"></div>
  <div class="cb cb-bl"></div><div class="cb cb-br"></div>

  <div class="hud-corner hud-tl">
    STARK INDUSTRIES<br>
    ARC REACTOR v4.1<br>
    STATUS: ONLINE
  </div>
  <div class="hud-corner hud-bl">
    FIELD COHERENCE: STABLE<br>
    PLASMA LOOP: ACTIVE
  </div>

  <!-- ── CLOCK PANEL (top-right) ── -->
  <div id="clock-panel">
    <div id="clock-daydate"><span class="day-name" id="ct-day">MON</span><span id="ct-date">01 JAN 2025</span></div>
    <div id="clock-time">
      <span id="ct-h">00</span><span class="colon">:</span><span id="ct-m">00</span><span class="sec"><span class="colon">:</span><span id="ct-s">00</span></span>
    </div>
    <div id="clock-ampm"><span id="ct-ampm">AM</span></div>
    <div id="clock-location">📍 <span id="ct-loc">LOCATING...</span></div>
  </div>
</div>
<div id="sbar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ==========================================================
   ARC REACTOR — LIVE WALLPAPER  (Speed++ & Live Clock)
   Shape: Iron Man Mark-II — segmented ring + downward triangle
   ========================================================== */

const canvas = document.getElementById('c');
let W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010306);
scene.fog = new THREE.FogExp2(0x010408, 0.032);

const camera = new THREE.PerspectiveCamera(52, W / H, 0.1, 200);
camera.position.set(0, 0, 10);
camera.lookAt(0, 0, 0);

const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
window.addEventListener('mousemove', e => {
  mouse.tx = (e.clientX / W - 0.5) * 2;
  mouse.ty = -(e.clientY / H - 0.5) * 2;
});

/* ════════════════════════════
   LIVE CLOCK + LOCATION
   ════════════════════════════ */
const elH   = document.getElementById('ct-h');
const elM   = document.getElementById('ct-m');
const elS   = document.getElementById('ct-s');
const elAP  = document.getElementById('ct-ampm');
const elDay = document.getElementById('ct-day');
const elDt  = document.getElementById('ct-date');
const elLoc = document.getElementById('ct-loc');

const DAYS  = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
const MONTHS= ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function pad(n){ return String(n).padStart(2,'0'); }

function tickClock() {
  const now  = new Date();
  let   h    = now.getHours();
  const m    = now.getMinutes();
  const s    = now.getSeconds();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;

  elH.textContent  = pad(h);
  elM.textContent  = pad(m);
  elS.textContent  = pad(s);
  elAP.textContent = ampm;
  elDay.textContent = DAYS[now.getDay()];
  elDt.textContent  = `  ${pad(now.getDate())} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
}
tickClock();
setInterval(tickClock, 1000);

// Geolocation → city name via reverse geocode (nominatim, no key needed)
function fetchLocation() {
  if (!navigator.geolocation) { elLoc.textContent = 'LOCATION UNAVAILABLE'; return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
      .then(r => r.json())
      .then(data => {
        const city    = data.address.city || data.address.town || data.address.village || data.address.county || '';
        const country = data.address.country_code ? data.address.country_code.toUpperCase() : '';
        elLoc.textContent = city ? `${city.toUpperCase()}, ${country}` : country || 'EARTH';
      })
      .catch(() => {
        elLoc.textContent = `${lat.toFixed(2)}°N  ${lon.toFixed(2)}°E`;
      });
  }, () => {
    elLoc.textContent = 'LOCATION DENIED';
  });
}
fetchLocation();

/* ── COLOURS ── */
const C_BLUE  = new THREE.Color(0x00ccff);
const C_CYAN  = new THREE.Color(0x00eeff);
const C_WHITE = new THREE.Color(0xffffff);

function metalMat(hex, rough=0.2, metal=0.97){
  return new THREE.MeshStandardMaterial({color:hex,roughness:rough,metalness:metal});
}

/* ════════════════════════════
   LIGHTING
   ════════════════════════════ */
scene.add(new THREE.AmbientLight(0x0a1a2a, 0.5));

const coreLight = new THREE.PointLight(C_BLUE, 14, 20);
coreLight.position.set(0, 0, 1.2);
coreLight.castShadow = true;
scene.add(coreLight);

const rimLight = new THREE.PointLight(0x003388, 4, 28);
rimLight.position.set(0, 0, -7);
scene.add(rimLight);

const fill = new THREE.DirectionalLight(0x1a2d40, 0.9);
fill.position.set(4, 7, 5);
scene.add(fill);

const sA = new THREE.SpotLight(0x0099ff, 7, 32, Math.PI/8, 0.65);
sA.position.set(5,5,7); scene.add(sA);
const sB = new THREE.SpotLight(0x0044bb, 4, 32, Math.PI/10, 0.8);
sB.position.set(-5,-4,6); scene.add(sB);

/* ════════════════════════════
   REACTOR GROUP
   ════════════════════════════ */
const reactor = new THREE.Group();
scene.add(reactor);

/* 1. OUTER BEZEL */
const outerBezel = new THREE.Mesh(
  new THREE.TorusGeometry(3.55, 0.30, 32, 120),
  metalMat(0x0e1c28, 0.15, 0.99)
);
reactor.add(outerBezel);

const innerBezel = new THREE.Mesh(
  new THREE.TorusGeometry(3.10, 0.10, 20, 100),
  metalMat(0x1a2d3e, 0.18, 0.98)
);
reactor.add(innerBezel);

const boltMat = metalMat(0x223344, 0.25, 1.0);
for(let i=0;i<16;i++){
  const a=(i/16)*Math.PI*2;
  const bolt=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.055,0.2,8),boltMat);
  bolt.position.set(Math.cos(a)*3.55,Math.sin(a)*3.55,0.3);
  bolt.rotation.x=Math.PI/2;
  reactor.add(bolt);
}

/* 2. GLOW SEGMENTS */
const SEGS=12;
const segGroup=new THREE.Group();
reactor.add(segGroup);

const SEG_R=2.72, SEG_W=0.52, SEG_H=0.28, SEG_D=0.22;
const segMats=[];

for(let i=0;i<SEGS;i++){
  const a=(i/SEGS)*Math.PI*2;
  const cx=Math.cos(a)*SEG_R, cy=Math.sin(a)*SEG_R;

  const backing=new THREE.Mesh(
    new THREE.BoxGeometry(SEG_W+0.1,SEG_H+0.08,SEG_D*0.4),
    metalMat(0x0a1620,0.12,0.99)
  );
  backing.position.set(cx,cy,-0.05);
  backing.rotation.z=a;
  segGroup.add(backing);

  const pMat=new THREE.MeshStandardMaterial({
    color:C_CYAN, emissive:C_CYAN, emissiveIntensity:3.8,
    roughness:0.04, metalness:0, transparent:true, opacity:0.92,
  });
  segMats.push(pMat);

  const panel=new THREE.Mesh(new THREE.BoxGeometry(SEG_W,SEG_H,SEG_D),pMat);
  panel.position.set(cx,cy,0.06);
  panel.rotation.z=a;
  segGroup.add(panel);

  const edge=new THREE.Mesh(
    new THREE.BoxGeometry(SEG_W*0.7,0.025,SEG_D+0.04),
    new THREE.MeshStandardMaterial({color:C_WHITE,emissive:C_WHITE,emissiveIntensity:5,roughness:0,metalness:0})
  );
  edge.position.set(cx*1.014,cy*1.014,0.06);
  edge.rotation.z=a;
  segGroup.add(edge);
}

/* 3. MID RING */
const midRing=new THREE.Mesh(
  new THREE.TorusGeometry(2.28,0.07,16,90),
  metalMat(0x162030,0.2,0.98)
);
reactor.add(midRing);

const midGlow=new THREE.Mesh(
  new THREE.TorusGeometry(2.28,0.025,10,90),
  new THREE.MeshStandardMaterial({color:C_BLUE,emissive:C_BLUE,emissiveIntensity:2.5,roughness:0,metalness:0,transparent:true,opacity:0.6})
);
reactor.add(midGlow);

/* 4. DOWNWARD TRIANGLE */
const triGroup=new THREE.Group();
reactor.add(triGroup);

const TRI_R=1.72;
const triVerts=[];
for(let i=0;i<3;i++){
  const a=(i/3)*Math.PI*2+Math.PI/2+Math.PI;
  triVerts.push(new THREE.Vector2(Math.cos(a)*TRI_R,Math.sin(a)*TRI_R));
}

const triEdgeMats=[];
for(let i=0;i<3;i++){
  const va=triVerts[i], vb=triVerts[(i+1)%3];
  const dx=vb.x-va.x, dy=vb.y-va.y;
  const len=Math.sqrt(dx*dx+dy*dy);
  const mx=(va.x+vb.x)/2, my=(va.y+vb.y)/2;
  const rot=Math.atan2(dy,dx);

  const backing=new THREE.Mesh(
    new THREE.BoxGeometry(len+0.05,0.22,0.20),
    metalMat(0x0c1a26,0.13,0.99)
  );
  backing.position.set(mx,my,-0.04);
  backing.rotation.z=rot;
  triGroup.add(backing);

  const eMat=new THREE.MeshStandardMaterial({
    color:C_CYAN,emissive:C_CYAN,emissiveIntensity:4.0,roughness:0.04,metalness:0,
  });
  triEdgeMats.push(eMat);

  const edgeMesh=new THREE.Mesh(new THREE.BoxGeometry(len,0.13,0.22),eMat);
  edgeMesh.position.set(mx,my,0.06);
  edgeMesh.rotation.z=rot;
  triGroup.add(edgeMesh);

  const hotLine=new THREE.Mesh(
    new THREE.BoxGeometry(len*0.85,0.030,0.25),
    new THREE.MeshStandardMaterial({color:C_WHITE,emissive:C_WHITE,emissiveIntensity:7,roughness:0,metalness:0})
  );
  hotLine.position.set(mx,my,0.10);
  hotLine.rotation.z=rot;
  triGroup.add(hotLine);
}

for(let i=0;i<3;i++){
  const v=triVerts[i];
  const node=new THREE.Mesh(
    new THREE.SphereGeometry(0.14,20,20),
    new THREE.MeshStandardMaterial({color:C_CYAN,emissive:C_CYAN,emissiveIntensity:5,roughness:0,metalness:0})
  );
  node.position.set(v.x,v.y,0.08);
  triGroup.add(node);

  const haloRing=new THREE.Mesh(
    new THREE.TorusGeometry(0.22,0.018,8,32),
    new THREE.MeshStandardMaterial({color:C_BLUE,emissive:C_BLUE,emissiveIntensity:3,roughness:0,metalness:0,transparent:true,opacity:0.5})
  );
  haloRing.position.set(v.x,v.y,0.08);
  triGroup.add(haloRing);
}

/* 5. ORBIT RINGS */
const orbitGroup=new THREE.Group();
reactor.add(orbitGroup);

const orbitData=[
  {r:1.1, color:0x00ccff, tiltX:0.0,           speed:1.5 },
  {r:1.1, color:0x0077ff, tiltX:Math.PI/3,      speed:-1.1},
  {r:1.1, color:0x00ffdd, tiltX:-Math.PI/3,     speed:1.3 },
];
const orbitRings=[];
orbitData.forEach(({r,color,tiltX,speed})=>{
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(r,0.030,14,110),
    new THREE.MeshStandardMaterial({
      color,emissive:new THREE.Color(color),emissiveIntensity:3.2,
      roughness:0.04,metalness:0,transparent:true,opacity:0.80,
    })
  );
  ring.rotation.x=tiltX;
  ring.userData.speed=speed;
  orbitGroup.add(ring);
  orbitRings.push(ring);
});

/* 6. CORE SPHERE */
const coreSphere=new THREE.Mesh(
  new THREE.SphereGeometry(0.50,64,64),
  new THREE.MeshStandardMaterial({
    color:C_WHITE,emissive:C_BLUE,emissiveIntensity:5.5,
    roughness:0,metalness:0.05,transparent:true,opacity:0.94,
  })
);
reactor.add(coreSphere);

const innerCore=new THREE.Mesh(
  new THREE.SphereGeometry(0.28,32,32),
  new THREE.MeshStandardMaterial({color:C_WHITE,emissive:C_WHITE,emissiveIntensity:9,roughness:0,metalness:0})
);
reactor.add(innerCore);

const halo=new THREE.Mesh(
  new THREE.SphereGeometry(0.78,32,32),
  new THREE.MeshStandardMaterial({
    color:C_BLUE,emissive:C_BLUE,emissiveIntensity:1.5,
    transparent:true,opacity:0.14,side:THREE.BackSide,roughness:0,metalness:0,
  })
);
reactor.add(halo);

/* 7. BACK PLATE */
const backPlate=new THREE.Mesh(
  new THREE.CircleGeometry(3.15,64),
  new THREE.MeshStandardMaterial({color:0x070f18,roughness:0.06,metalness:0.98})
);
backPlate.position.z=-0.28;
reactor.add(backPlate);

/* 8. NOTCH RING */
const notchGroup=new THREE.Group();
reactor.add(notchGroup);

for(let i=0;i<28;i++){
  const a=(i/28)*Math.PI*2, r=2.52;
  const isLit=i%4===0;
  const notch=new THREE.Mesh(
    new THREE.BoxGeometry(0.04,0.24,0.08),
    isLit
      ? new THREE.MeshStandardMaterial({color:C_CYAN,emissive:C_CYAN,emissiveIntensity:2,roughness:0,metalness:0,transparent:true,opacity:0.75})
      : metalMat(0x182838,0.2,0.98)
  );
  notch.position.set(Math.cos(a)*r,Math.sin(a)*r,0);
  notch.rotation.z=a;
  notchGroup.add(notch);
}

/* 9. PULSE RINGS */
const pulseRings=[];
for(let i=0;i<5;i++){
  const pr=new THREE.Mesh(
    new THREE.TorusGeometry(0.55,0.020,8,80),
    new THREE.MeshStandardMaterial({
      color:C_BLUE,emissive:C_BLUE,emissiveIntensity:3,
      transparent:true,opacity:0.68,roughness:0,metalness:0,
      blending:THREE.AdditiveBlending,depthWrite:false,
    })
  );
  pr.userData.scale  =0.55+i*0.6;
  pr.userData.opacity=Math.max(0,0.66-i*0.13);
  reactor.add(pr);
  pulseRings.push(pr);
}

/* ═══════════ PARTICLES ═══════════ */

// Orbital dust
const PDUST=1800;
const dPos=new Float32Array(PDUST*3);
const dSpeed=new Float32Array(PDUST);
const dRad=new Float32Array(PDUST);
const dPhase=new Float32Array(PDUST);

for(let i=0;i<PDUST;i++){
  const th=Math.random()*Math.PI*2;
  const r=1.0+Math.random()*5.5;
  dRad[i]=r; dPhase[i]=th;
  dSpeed[i]=(0.006+Math.random()*0.012)*(Math.random()>0.5?1:-1); // ← faster dust
  dPos[i*3]=Math.cos(th)*r; dPos[i*3+1]=Math.sin(th)*r; dPos[i*3+2]=(Math.random()-.5)*1.2;
}

const dustGeo=new THREE.BufferGeometry();
dustGeo.setAttribute('position',new THREE.BufferAttribute(dPos,3));
scene.add(new THREE.Points(dustGeo,new THREE.PointsMaterial({
  color:0x0099cc,size:0.038,transparent:true,opacity:0.48,
  sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false,
})));

// Core sparks
const SPARKS=260;
const spPos=new Float32Array(SPARKS*3);
const spVel=[];
for(let i=0;i<SPARKS;i++){
  const a=Math.random()*Math.PI*2;
  const b=Math.acos(2*Math.random()-1);
  const r=0.52+Math.random()*0.22;
  spPos[i*3]=Math.sin(b)*Math.cos(a)*r;
  spPos[i*3+1]=Math.sin(b)*Math.sin(a)*r;
  spPos[i*3+2]=Math.cos(b)*r;
  spVel.push({vx:(Math.random()-.5)*.055,vy:(Math.random()-.5)*.055,vz:(Math.random()-.5)*.055,life:Math.random()}); // ← faster sparks
}
const sparkGeo=new THREE.BufferGeometry();
sparkGeo.setAttribute('position',new THREE.BufferAttribute(spPos,3));
reactor.add(new THREE.Points(sparkGeo,new THREE.PointsMaterial({
  color:0xffffff,size:0.052,transparent:true,opacity:0.82,
  sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false,
})));

// Stars
const starBuf=new Float32Array(1200*3);
for(let i=0;i<1200;i++){
  starBuf[i*3]=(Math.random()-.5)*180;
  starBuf[i*3+1]=(Math.random()-.5)*180;
  starBuf[i*3+2]=-35-Math.random()*55;
}
const starGeo=new THREE.BufferGeometry();
starGeo.setAttribute('position',new THREE.BufferAttribute(starBuf,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0x334455,size:0.055,sizeAttenuation:true})));

// Centre glow quad
const glowQuad=new THREE.Mesh(
  new THREE.PlaneGeometry(5.5,5.5),
  new THREE.MeshBasicMaterial({color:0x001833,transparent:true,opacity:0.16,blending:THREE.AdditiveBlending,depthWrite:false})
);
glowQuad.position.z=0.15;
reactor.add(glowQuad);

/* ═══════════════════════════════════
   ANIMATE
   ═══════════════════════════════════ */
const coreMat=coreSphere.material;
let t=0;

function animate(){
  requestAnimationFrame(animate);
  t+=0.016;

  // Mouse lerp
  mouse.x+=(mouse.tx-mouse.x)*0.04;
  mouse.y+=(mouse.ty-mouse.y)*0.04;

  // Camera parallax
  camera.position.x=mouse.x*0.65+Math.sin(t*0.11)*0.09;
  camera.position.y=mouse.y*0.45+Math.cos(t*0.08)*0.07;
  camera.lookAt(0,0,0);

  // ── REACTOR ROTATION — increased from 0.07 → 0.18 ──
  reactor.rotation.z = t * 0.18;

  // ── SEGMENT RING counter-spin — increased from 0.04 → 0.12 ──
  segGroup.rotation.z = -t * 0.12;

  // ── TRIANGLE slow spin — increased from 0.05 → 0.13 ──
  triGroup.rotation.z = t * 0.13;

  // Triangle edge flicker
  triEdgeMats.forEach((mat,idx)=>{
    mat.emissiveIntensity=3.8+1.2*Math.sin(t*3.5+idx*0.9);
  });

  // Segment shimmer
  segMats.forEach((mat,i)=>{
    mat.emissiveIntensity=3.4+1.0*Math.sin(t*4.0+i*0.52)+0.4*Math.sin(t*9.0+i*1.1);
  });

  // ── NOTCH RING — increased from 0.38 → 0.85 ──
  notchGroup.rotation.z = -t * 0.85;

  // ── MID RING — increased from 0.12 → 0.30 ──
  midRing.rotation.z = t * 0.30;
  midGlow.rotation.z = t * 0.30;

  // ── ORBIT RINGS — speeds already set higher in orbitData ──
  orbitRings.forEach((ring,i)=>{
    ring.rotation.z=t*ring.userData.speed;
    const s=1+0.022*Math.sin(t*2.5+i*2.1);
    ring.scale.set(s,s,1);
  });

  // Core breathe (faster)
  const breathe=1+0.07*Math.sin(t*2.2);
  coreSphere.scale.setScalar(breathe);
  innerCore.scale.setScalar(1+0.14*Math.sin(t*5.0));

  // Core emissive flicker
  coreMat.emissiveIntensity=5+1.8*Math.sin(t*4.0)+0.8*Math.sin(t*10.5);

  // Light flicker
  coreLight.intensity=14+3.5*Math.sin(t*5.0)+1.5*Math.sin(t*9.5)+0.5*Math.random();
  coreLight.color.lerpColors(C_BLUE,C_WHITE,0.12+0.1*Math.sin(t*2.8));

  // Pulse rings
  pulseRings.forEach(pr=>{
    pr.userData.scale  +=0.038; // faster expand
    pr.userData.opacity-=0.014;
    if(pr.userData.scale>4.3){pr.userData.scale=0.55;pr.userData.opacity=0.65;}
    pr.scale.setScalar(pr.userData.scale);
    pr.material.opacity=Math.max(0,pr.userData.opacity);
    pr.material.emissiveIntensity=Math.max(0,pr.userData.opacity)*4.5;
  });

  // Sparks
  const sp=sparkGeo.attributes.position;
  for(let i=0;i<SPARKS;i++){
    const v=spVel[i];
    v.life-=0.016; // faster life decay = faster respawn
    if(v.life<0){
      const a2=Math.random()*Math.PI*2;
      const b2=Math.acos(2*Math.random()-1);
      const r=0.50+Math.random()*0.18;
      sp.setXYZ(i,Math.sin(b2)*Math.cos(a2)*r,Math.sin(b2)*Math.sin(a2)*r,Math.cos(b2)*r);
      v.vx=(Math.random()-.5)*.06;v.vy=(Math.random()-.5)*.06;v.vz=(Math.random()-.5)*.06;
      v.life=0.4+Math.random()*0.5;
    }
    sp.setXYZ(i,sp.getX(i)+v.vx,sp.getY(i)+v.vy,sp.getZ(i)+v.vz);
  }
  sp.needsUpdate=true;

  // Dust
  const dp=dustGeo.attributes.position;
  for(let i=0;i<PDUST;i++){
    dPhase[i]+=dSpeed[i];
    dp.setXYZ(i,
      Math.cos(dPhase[i])*dRad[i],
      Math.sin(dPhase[i])*dRad[i],
      Math.sin(t*0.3+i*0.5)*0.35
    );
  }
  dp.needsUpdate=true;

  // Glow quad
  glowQuad.scale.setScalar(1+0.10*Math.sin(t*2.4));
  glowQuad.material.opacity=0.13+0.06*Math.sin(t*2.0);

  renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  camera.aspect=W/H;
  camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});
</script>
</body>
</html>
